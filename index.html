<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eat Snaac — Field Team Dashboard</title>
  <meta name="theme-color" content="#0f0f1a">
  <link rel="apple-touch-icon" href="data:,">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --bg-surface: #16162b;
      --text-primary: #e8e6f0;
      --text-secondary: #9896a8;
      --text-muted: #6b6980;
      --accent-teal: #2dd4a8;
      --accent-teal-dim: rgba(45, 212, 168, 0.12);
      --accent-amber: #f0a030;
      --accent-amber-dim: rgba(240, 160, 48, 0.12);
      --accent-coral: #e85454;
      --accent-coral-dim: rgba(232, 84, 84, 0.12);
      --accent-blue: #5b8dee;
      --accent-blue-dim: rgba(91, 141, 238, 0.12);
      --accent-purple: #9b7bea;
      --accent-purple-dim: rgba(155, 123, 234, 0.12);
      --border: rgba(255, 255, 255, 0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; -webkit-font-smoothing: antialiased; }
    .app { max-width: 1200px; margin: 0 auto; padding: 20px 16px 60px; }

    .header { display: flex; justify-content: space-between; align-items: flex-start; padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .header-left h1 { font-family: var(--font-display); font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
    .header-left .subtitle { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .header-left .status { font-size: 12px; color: var(--accent-teal); display: flex; align-items: center; margin-top: 6px; }
    .live-dot { display: inline-block; width: 7px; height: 7px; background: var(--accent-teal); border-radius: 50%; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .header-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .refresh-btn { font-family: var(--font-body); font-size: 12px; font-weight: 600; padding: 8px 18px; background: var(--accent-teal-dim); border: 1px solid rgba(45,212,168,0.3); border-radius: 20px; color: var(--accent-teal); cursor: pointer; transition: all 0.2s; }
    .refresh-btn:hover { background: rgba(45,212,168,0.2); }
    .refresh-btn:active { transform: scale(0.97); }
    .last-refresh { font-size: 11px; color: var(--text-muted); }

    .date-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-bar input { font-family: var(--font-body); font-size: 13px; padding: 7px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); outline: none; }
    .date-bar input::-webkit-calendar-picker-indicator { filter: invert(0.7); }
    .date-btn { font-family: var(--font-body); font-size: 12px; padding: 7px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
    .date-btn:hover { background: var(--bg-card); }
    .date-btn.active { background: var(--accent-blue-dim); color: var(--accent-blue); border-color: rgba(91,141,238,0.3); }
    .date-display { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-left: 4px; }

    .nav { display: flex; gap: 6px; margin-bottom: 22px; overflow-x: auto; padding-bottom: 4px; }
    .nav button { font-family: var(--font-body); font-size: 13px; font-weight: 500; padding: 8px 16px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: all 0.2s; }
    .nav button:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav button.active { background: var(--accent-teal-dim); color: var(--accent-teal); border-color: rgba(45,212,168,0.3); }

    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .mc { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; position: relative; overflow: hidden; }
    .mc::before { content:''; position: absolute; top:0; left:0; right:0; height: 3px; }
    .mc.teal::before { background: var(--accent-teal); }
    .mc.amber::before { background: var(--accent-amber); }
    .mc.coral::before { background: var(--accent-coral); }
    .mc.blue::before { background: var(--accent-blue); }
    .mc .ml { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }
    .mc .mv { font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1; }
    .mc .ms { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
    .mc.teal .mv { color: var(--accent-teal); }
    .mc.amber .mv { color: var(--accent-amber); }
    .mc.coral .mv { color: var(--accent-coral); }
    .mc.blue .mv { color: var(--accent-blue); }

    .section { margin-bottom: 28px; }
    .sh { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .st { font-size: 16px; font-weight: 600; }
    .sc { font-size: 12px; color: var(--text-muted); background: var(--bg-card); padding: 4px 10px; border-radius: 12px; }

    .fg { display: grid; gap: 10px; }
    .fc { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: grid; grid-template-columns: 1fr auto; gap: 8px; transition: background 0.2s; }
    .fc:hover { background: var(--bg-card-hover); }
    .fc .fn { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .fc .fd { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
    .fc .fcon { font-size: 12px; color: var(--accent-blue); margin-top: 2px; }
    .fc .fright { text-align: right; flex-shrink: 0; }
    .fc .fdate { font-size: 11px; color: var(--text-muted); }
    .fc .fby { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

    .tag { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis; margin-top: 6px; }
    .tag-followup { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .tag-negative { background: var(--accent-coral-dim); color: var(--accent-coral); }
    .tag-positive { background: var(--accent-teal-dim); color: var(--accent-teal); }
    .tag-info { background: var(--accent-blue-dim); color: var(--accent-blue); }

    .tw { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg-card); }
    .at { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 650px; }
    .at th { text-align: left; padding: 12px 14px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--bg-surface); }
    .at td { padding: 12px 14px; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .at tr:last-child td { border-bottom: none; }
    .at tr:hover td { background: rgba(255,255,255,0.02); }
    .person { display: flex; align-items: center; gap: 10px; }
    .avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .pn { font-weight: 500; color: var(--text-primary); }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .by { background: var(--accent-teal-dim); color: var(--accent-teal); }
    .bn { background: var(--accent-coral-dim); color: var(--accent-coral); }
    .bm { background: var(--accent-teal-dim); color: var(--accent-teal); }
    .bmm { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .nh { font-weight: 600; color: var(--text-primary); font-size: 15px; }

    .cc { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
    .cl { display: flex; gap: 20px; margin-bottom: 16px; font-size: 12px; color: var(--text-secondary); }
    .cl span { display: flex; align-items: center; gap: 6px; }
    .ld { width: 10px; height: 10px; border-radius: 3px; }
    .cw { position: relative; height: 280px; }

    .pg { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
    .pc { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
    .pch { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
    .pcn { font-weight: 600; font-size: 14px; }
    .pcr { font-size: 11px; color: var(--text-muted); }
    .pcs { display: flex; justify-content: space-between; padding: 4px 0; font-size: 12px; color: var(--text-secondary); }
    .pcs .v { font-weight: 600; color: var(--text-primary); }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .fchip { font-family: var(--font-body); font-size: 12px; padding: 6px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; color: var(--text-secondary); cursor: pointer; transition: all 0.2s; }
    .fchip:hover, .fchip.active { background: var(--accent-purple-dim); color: var(--accent-purple); border-color: rgba(155,123,234,0.3); }

    .empty { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: 14px; }
    .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent-teal); border-radius: 50%; animation: spin .8s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .fu { animation: fadeUp .4s ease-out both; }
    .d1 { animation-delay: .05s; }
    .d2 { animation-delay: .1s; }
    .d3 { animation-delay: .15s; }

    @media(max-width:600px) {
      .header-left h1 { font-size: 22px; }
      .metrics { grid-template-columns: repeat(2,1fr); }
      .mc .mv { font-size: 24px; }
      .pg { grid-template-columns: 1fr; }
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
<div class="app" id="app">
  <div class="loading"><div class="spinner"></div>Loading dashboard...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const SHEETS_API_KEY = 'YOUR_API_KEY_HERE';
const SPREADSHEET_ID = '1L90-InfX6NAlogvzDi7_TkhO8U2MILJNTrtKP42kYN0';

const SHEET_NAMES = {
  morning: 'Morning Routine',
  visit: 'Visit',
  evening: 'Evening Routine',
  attendance: 'Attendance',
  masterClient: 'Master client data'
};

const ID_TO_NAME = {
  '7670541357': 'Sunilkumar K.S',
  '8582787350': 'Shiva',
  '1442578843': 'Jagadeesh',
  '7266228505': 'Sandeep',
  '8513411046': 'Senthilkumar T',
};

const COLORS = [
  {bg:'rgba(45,212,168,0.15)',text:'#2dd4a8'},
  {bg:'rgba(91,141,238,0.15)',text:'#5b8dee'},
  {bg:'rgba(155,123,234,0.15)',text:'#9b7bea'},
  {bg:'rgba(240,160,48,0.15)',text:'#f0a030'},
  {bg:'rgba(232,84,84,0.15)',text:'#e85454'},
];

async function fetchSheet(name) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(name)}?key=${SHEETS_API_KEY}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (!d.values || d.values.length < 2) return [];
    const h = d.values[0];
    return d.values.slice(1).map(row => {
      const o = {};
      h.forEach((k, i) => { o[k.trim()] = (row[i] || '').trim(); });
      return o;
    });
  } catch(e) { console.error(e); return []; }
}

async function fetchAll() {
  const [morning, visit, evening, attendance, clients] = await Promise.all([
    fetchSheet(SHEET_NAMES.morning), fetchSheet(SHEET_NAMES.visit),
    fetchSheet(SHEET_NAMES.evening), fetchSheet(SHEET_NAMES.attendance),
    fetchSheet(SHEET_NAMES.masterClient)
  ]);
  return {morning, visit, evening, attendance, clients};
}

function ini(s) { if(!s) return '??'; return s.split(/[\s.]+/).filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function nameFor(id) { return ID_TO_NAME[String(id).trim()] || ID_TO_NAME[String(parseInt(id))] || 'Unknown'; }

function classifyComment(c) {
  if(!c) return 'info';
  const l = c.toLowerCase();
  if(l.includes('not interested')||l.includes('not intrested')||l.includes('not available')||l.includes('not avipable')||l.includes('is not interested')) return 'negative';
  if(l.includes('order')||l.includes('confirmed')||l.includes('payment')||l.includes('give order')||l.includes('placed')) return 'positive';
  if(l.includes('next')||l.includes('again')||l.includes('follow')||l.includes('week')||l.includes('interest')||l.includes('intrested')||l.includes('meet')||l.includes('discuss')||l.includes('discus')||l.includes('tomorrow')||l.includes('monday')||l.includes('tuesday')||l.includes('wednesday')||l.includes('thursday')||l.includes('friday')||l.includes('april')||l.includes('march')||l.includes('wants')||l.includes('ready')||l.includes('will come')) return 'followup';
  return 'info';
}
function tagCls(t) { return {negative:'tag-negative',positive:'tag-positive',followup:'tag-followup',info:'tag-info'}[t]||'tag-info'; }

function istNow() {
  return new Date();
}
function todayStr() {
  const d = new Date();
  return d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
}
function norm(d) {
  if(!d) return '';
  d = d.trim();
  d = d.replace(/-/g, '/');
  d = d.replace(/\.\./g, '/');
  let parts = d.split('/');
  if(parts.length !== 3) return d;
  let day = parseInt(parts[0]) || 0;
  let month = parseInt(parts[1]) || 0;
  let year = parseInt(parts[2]) || 0;
  if(year < 100) year += 2000;
  if(year === 2025) year = 2026;
  return day + '/' + month + '/' + year;
}
function filterDate(arr, field, ds) {
  const nd = norm(ds);
  return arr.filter(r => norm(r[field]||'') === nd);
}
function parseDate(dateStr) {
  if(!dateStr) return null;
  const n = norm(dateStr);
  const parts = n.split('/');
  if(parts.length!==3) return null;
  let day = parseInt(parts[0]);
  let month = parseInt(parts[1]);
  let year = parseInt(parts[2]);
  if(year < 100) year += 2000;
  return new Date(year, month-1, day);
}
function daysSince(dateStr) {
  const d = parseDate(dateStr);
  if(!d) return null;
  const now = istNow();
  const diff = Math.floor((now-d)/(1000*60*60*24));
  return diff >= 0 ? diff : null;
}
function sortByDateDesc(arr, field) {
  return [...arr].sort((a,b) => {
    const da = parseDate(a[field]);
    const db = parseDate(b[field]);
    if(!da && !db) return 0;
    if(!da) return 1;
    if(!db) return -1;
    return db - da;
  });
}
function formatDateNice(ds) {
  if(!ds) return '';
  const p = norm(ds).split('/');
  if(p.length!==3) return ds;
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return p[0]+' '+months[parseInt(p[1])-1]+' '+p[2];
}

let tab = 'followups';
let data = null;
let selectedDate = todayStr();
let viewMode = 'day';
let lastRefreshTime = null;
let chartInstance = null;

function render() {
  const app = document.getElementById('app');
  const tAtt = filterDate(data.attendance, 'Date', selectedDate);
  const tVis = filterDate(data.visit, 'Date', selectedDate);

  const totalVisits = tVis.length;
  const active = tAtt.filter(a => (a['Morning Report']||'').includes('✅')).length;
  const total = Object.keys(ID_TO_NAME).length;
  const eveSent = tAtt.filter(a => (a['Evening report']||'').includes('✅')).length;
  const mismatches = tAtt.filter(a => (a['Match']||'').includes('❌')).length;
  const followups = data.clients.filter(c => classifyComment(c.Comment)==='followup');
  const positives = data.clients.filter(c => classifyComment(c.Comment)==='positive');

  const refreshText = lastRefreshTime ? 'Last refreshed: '+lastRefreshTime.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',timeZone:'Asia/Kolkata'}) : '';

  app.innerHTML = `
    <header class="header fu">
      <div class="header-left">
        <h1>Eat Snaac</h1>
        <div class="subtitle">Field team performance tracker</div>
        <div class="status"><span class="live-dot"></span>Live</div>
      </div>
      <div class="header-right">
        <span class="last-refresh">${refreshText}</span>
        <button class="refresh-btn" onclick="refreshData()">Refresh</button>
      </div>
    </header>

    <div class="date-bar fu d1">
      <input type="date" id="datePicker" value="${toInputDate(selectedDate)}" onchange="pickDate(this.value)">
      <button class="date-btn" onclick="goToday()" style="background:var(--accent-teal-dim);color:var(--accent-teal);border-color:rgba(45,212,168,0.3)">Today</button>
      <button class="date-btn ${viewMode==='day'?'active':''}" onclick="setView('day')">Day</button>
      <button class="date-btn ${viewMode==='week'?'active':''}" onclick="setView('week')">Week</button>
      <span class="date-display">${viewMode==='day' ? formatDateNice(selectedDate) : 'Week of '+formatDateNice(selectedDate)}</span>
    </div>

    <nav class="nav fu d1">
      <button class="${tab==='followups'?'active':''}" onclick="go('followups')">Follow-ups</button>
      <button class="${tab==='visits'?'active':''}" onclick="go('visits')">Visits</button>
      <button class="${tab==='attendance'?'active':''}" onclick="go('attendance')">Attendance</button>
      <button class="${tab==='clients'?'active':''}" onclick="go('clients')">All clients</button>
    </nav>

    <div class="metrics fu d2">
      <div class="mc amber"><div class="ml">Pending follow-ups</div><div class="mv">${followups.length}</div><div class="ms">${positives.length} orders confirmed</div></div>
      <div class="mc teal"><div class="ml">Visits ${viewMode==='day'?'today':'this week'}</div><div class="mv">${viewMode==='day'?totalVisits:getWeekVisits()}</div><div class="ms">${totalVisits>0&&active>0?'Avg '+(totalVisits/active).toFixed(1)+' per person':'—'}</div></div>
      <div class="mc blue"><div class="ml">Active today</div><div class="mv">${active}<span style="font-size:16px;color:var(--text-muted)">/${total}</span></div><div class="ms">${eveSent} evening reports in</div></div>
      <div class="mc coral"><div class="ml">Mismatches</div><div class="mv">${mismatches}</div><div class="ms">${mismatches>0?'Needs attention':'All clear'}</div></div>
    </div>

    <div id="tabContent" class="fu d3"></div>
  `;
  renderTab();
}

function toInputDate(ds) {
  const p = norm(ds).split('/');
  if(p.length!==3) return '';
  return p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
}
function fromInputDate(v) {
  const p = v.split('-');
  return parseInt(p[2])+'/'+parseInt(p[1])+'/'+p[0];
}
function pickDate(v) { selectedDate = fromInputDate(v); render(); }
function goToday() { selectedDate = todayStr(); render(); }
function setView(v) { viewMode = v; render(); }
function go(t) { tab = t; renderTab(); document.querySelectorAll('.nav button').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().replace('-','').replace(' ','')=== t)); }

function getWeekVisits() {
  const p = norm(selectedDate).split('/');
  const base = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  const dow = base.getDay();
  const mon = new Date(base); mon.setDate(base.getDate() - (dow===0?6:dow-1));
  let count = 0;
  for(let i=0; i<7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const ds = d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear();
    count += filterDate(data.visit, 'Date', ds).length;
  }
  return count;
}

function getWeekDays() {
  const p = norm(selectedDate).split('/');
  const base = new Date(parseInt(p[2]), parseInt(p[1])-1, parseInt(p[0]));
  const dow = base.getDay();
  const mon = new Date(base); mon.setDate(base.getDate() - (dow===0?6:dow-1));
  const days = [];
  const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  for(let i=0; i<7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    days.push({
      label: dayNames[i],
      dateStr: d.getDate()+'/'+(d.getMonth()+1)+'/'+d.getFullYear(),
      date: d
    });
  }
  return days;
}

function renderTab() {
  const el = document.getElementById('tabContent');
  if(!el) return;
  if(chartInstance) { chartInstance.destroy(); chartInstance=null; }
  switch(tab) {
    case 'followups': renderFollowups(el); break;
    case 'visits': renderVisits(el); break;
    case 'attendance': renderAttendance(el); break;
    case 'clients': renderClients(el); break;
  }
}

function firmCard(f, type) {
  const tc = tagCls(type);
  const ds = daysSince(f.LastVisitedDate);
  const daysText = ds !== null ? (ds === 0 ? 'Today' : ds === 1 ? 'Yesterday' : ds + ' days ago') : '';
  return `<div class="fc">
    <div>
      <div class="fn">${f['Firm Name']||'—'}</div>
      <div class="fd">${[f['Contact Person'],f.Address,f.Town].filter(Boolean).join(' · ')}</div>
      ${f.Mobile ? '<div class="fcon">'+f.Mobile+'</div>' : ''}
      <div class="tag ${tc}">${f.Comment||'—'}</div>
    </div>
    <div class="fright">
      <div class="fdate">${formatDateNice(f.LastVisitedDate)}</div>
      <div class="fby">${f.LastVisitedBy||''}</div>
      ${daysText ? '<div style="font-size:10px;color:var(--text-muted);margin-top:2px">'+daysText+'</div>' : ''}
    </div>
  </div>`;
}

function renderFollowups(el) {
  const followups = sortByDateDesc(data.clients.filter(c => classifyComment(c.Comment)==='followup'), 'LastVisitedDate');
  const positives = sortByDateDesc(data.clients.filter(c => classifyComment(c.Comment)==='positive'), 'LastVisitedDate');
  const negatives = sortByDateDesc(data.clients.filter(c => classifyComment(c.Comment)==='negative'), 'LastVisitedDate');

  el.innerHTML = `
    <div class="section"><div class="sh"><div class="st">Pending follow-ups</div><span class="sc">${followups.length} firms</span></div>
    <div class="fg">${followups.length?followups.map(f=>firmCard(f,'followup')).join(''):'<div class="empty">No pending follow-ups</div>'}</div></div>

    <div class="section"><div class="sh"><div class="st">Orders confirmed</div><span class="sc">${positives.length} firms</span></div>
    <div class="fg">${positives.length?positives.map(f=>firmCard(f,'positive')).join(''):'<div class="empty">No confirmed orders yet</div>'}</div></div>

    <div class="section"><div class="sh"><div class="st">Not interested / rejected</div><span class="sc">${negatives.length} firms</span></div>
    <div class="fg">${negatives.length?negatives.map(f=>firmCard(f,'negative')).join(''):'<div class="empty">None</div>'}</div></div>
  `;
}

function renderVisits(el) {
  if(viewMode === 'week') { renderWeeklyVisits(el); return; }

  const tv = filterDate(data.visit, 'Date', selectedDate);
  const pm = {};
  tv.forEach(v => {
    const id = v['Telegram ID'];
    if(!pm[id]) pm[id] = {visits:[], name: nameFor(id)};
    pm[id].visits.push(v);
  });
  const persons = Object.entries(pm);

  el.innerHTML = `
    <div class="section"><div class="sh"><div class="st">Visits on ${formatDateNice(selectedDate)}</div><span class="sc">${tv.length} total</span></div>
    <div class="pg">${persons.length ? persons.map(([id,p],i) => {
      const c = COLORS[i%COLORS.length];
      return `<div class="pc"><div class="pch"><div class="avatar" style="background:${c.bg};color:${c.text}">${ini(p.name)}</div><div><div class="pcn">${p.name}</div><div class="pcr">${p.visits.length} visits</div></div></div>
      ${p.visits.map(v=>`<div class="pcs"><span>${v['Firm Name']||'—'}</span><span class="v">${v.Time||''}</span></div>`).join('')}</div>`;
    }).join('') : '<div class="empty">No visits recorded for this date</div>'}</div></div>
  `;
}

function renderWeeklyVisits(el) {
  const days = getWeekDays();
  const ids = Object.keys(ID_TO_NAME);
  const perPerson = {};
  ids.forEach(id => {
    perPerson[id] = {name: ID_TO_NAME[id], daily: [], total: 0};
    days.forEach(day => {
      const count = filterDate(data.visit, 'Date', day.dateStr).filter(v => String(v['Telegram ID']) === id).length;
      perPerson[id].daily.push(count);
      perPerson[id].total += count;
    });
  });

  el.innerHTML = `
    <div class="section"><div class="sh"><div class="st">Weekly visits — ${formatDateNice(days[0].dateStr)} to ${formatDateNice(days[6].dateStr)}</div></div>
    <div class="tw"><table class="at">
      <thead><tr><th>Name</th>${days.map(d=>'<th>'+d.label+'</th>').join('')}<th>Total</th></tr></thead>
      <tbody>${ids.map((id,i) => {
        const p = perPerson[id];
        const c = COLORS[i%COLORS.length];
        return `<tr><td><div class="person"><div class="avatar" style="background:${c.bg};color:${c.text}">${ini(p.name)}</div><span class="pn">${p.name}</span></div></td>
        ${p.daily.map(d=>'<td><span class="nh">'+(d||'—')+'</span></td>').join('')}
        <td><span class="nh" style="color:var(--accent-teal)">${p.total}</span></td></tr>`;
      }).join('')}</tbody>
    </table></div></div>

    <div class="section"><div class="sh"><div class="st">Comparison chart</div></div>
    <div class="cc"><div class="cl"><span><span class="ld" style="background:var(--accent-teal)"></span>Visits</span></div>
    <div class="cw"><canvas id="wChart"></canvas></div></div></div>
  `;

  const canvas = document.getElementById('wChart');
  if(canvas) {
    chartInstance = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: ids.map(id => ID_TO_NAME[id].split(' ')[0]),
        datasets: [{
          label: 'Total visits',
          data: ids.map(id => perPerson[id].total),
          backgroundColor: '#2dd4a8',
          borderRadius: 6,
          barPercentage: 0.5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {legend:{display:false}},
        scales: {
          x: {grid:{display:false}, ticks:{color:'#6b6980',font:{size:12}}},
          y: {grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#6b6980',stepSize:2}, beginAtZero:true}
        }
      }
    });
  }
}

function renderAttendance(el) {
  const tAtt = filterDate(data.attendance, 'Date', selectedDate);

  // Fill missing names from ID mapping
  tAtt.forEach(a => {
    if(!a.Name && !a.personName) {
      a.Name = nameFor(a['Telegram ID']);
    }
  });

  // If some team members have no row, add them as absent
  const presentIDs = new Set(tAtt.map(a => String(a['Telegram ID'])));
  Object.keys(ID_TO_NAME).forEach(id => {
    if(!presentIDs.has(id)) {
      tAtt.push({Date: selectedDate, Name: ID_TO_NAME[id], 'Telegram ID': id, 'Morning Report': '', 'Selfie visits': '0', 'Report Visits': '0', Match: '', 'Evening report': ''});
    }
  });

  el.innerHTML = `
    <div class="section"><div class="sh"><div class="st">Attendance — ${formatDateNice(selectedDate)}</div><span class="sc">${tAtt.length} people</span></div>
    <div class="tw"><table class="at">
      <thead><tr><th>Name</th><th>Morning</th><th>Selfie visits</th><th>Reported</th><th>Match</th><th>Evening</th></tr></thead>
      <tbody>${tAtt.map((a,i) => {
        const c = COLORS[i%COLORS.length];
        const name = a.Name || a.personName || nameFor(a['Telegram ID']);
        const mr = (a['Morning Report']||'').includes('✅');
        const er = (a['Evening report']||'').includes('✅');
        const match = (a['Match']||'');
        return `<tr>
          <td><div class="person"><div class="avatar" style="background:${c.bg};color:${c.text}">${ini(name)}</div><span class="pn">${name}</span></div></td>
          <td><span class="badge ${mr?'by':'bn'}">${mr?'sent':'missing'}</span></td>
          <td><span class="nh">${a['Selfie visits']||'0'}</span></td>
          <td><span class="nh">${a['Report Visits']||'0'}</span></td>
          <td>${match.includes('✅')?'<span class="badge bm">match</span>':match.includes('❌')?'<span class="badge bmm">mismatch</span>':'<span style="color:var(--text-muted)">—</span>'}</td>
          <td><span class="badge ${er?'by':'bn'}">${er?'sent':'missing'}</span></td>
        </tr>`;
      }).join('')}</tbody>
    </table></div></div>
  `;
}

function renderClients(el) {
  const all = sortByDateDesc(data.clients, 'LastVisitedDate');
  const types = ['all','followup','positive','negative','info'];
  el.innerHTML = `
    <div class="section"><div class="sh"><div class="st">Master client list</div><span class="sc">${all.length} firms</span></div>
    <div class="filters" id="cf">${types.map(t=>`<button class="fchip ${t==='all'?'active':''}" data-f="${t}">${t==='all'?'All':t==='followup'?'Follow-up':t==='positive'?'Confirmed':t==='negative'?'Rejected':'Other'}</button>`).join('')}</div>
    <div class="fg" id="cl">${all.map(f=>firmCard(f,classifyComment(f.Comment))).join('')}</div></div>
  `;
  document.getElementById('cf').addEventListener('click', e => {
    if(!e.target.classList.contains('fchip')) return;
    document.querySelectorAll('.fchip').forEach(c=>c.classList.remove('active'));
    e.target.classList.add('active');
    const f = e.target.dataset.f;
    const filtered = sortByDateDesc(f==='all'?all:all.filter(x=>classifyComment(x.Comment)===f), 'LastVisitedDate');
    document.getElementById('cl').innerHTML = filtered.length?filtered.map(x=>firmCard(x,classifyComment(x.Comment))).join(''):'<div class="empty">No firms in this category</div>';
  });
}

async function refreshData() {
  const btn = document.querySelector('.refresh-btn');
  if(btn) { btn.textContent = 'Refreshing...'; btn.style.opacity = '0.6'; }
  if(SHEETS_API_KEY !== 'YOUR_API_KEY_HERE') {
    data = await fetchAll();
  }
  lastRefreshTime = new Date();
  if(btn) { btn.textContent = 'Refresh'; btn.style.opacity = '1'; }
  render();
}

async function init() {
  if(SHEETS_API_KEY !== 'YOUR_API_KEY_HERE') {
    data = await fetchAll();
  } else {
    // Demo fallback
    data = {morning:[],visit:[],evening:[],attendance:[],clients:[]};
    document.getElementById('app').innerHTML = '<div class="empty" style="padding:80px 20px"><div style="font-size:18px;margin-bottom:8px">API key not configured</div><div style="color:var(--text-muted)">Add your Google Sheets API key to see live data</div></div>';
    return;
  }
  lastRefreshTime = new Date();
  render();
}

init();
</script>
</body>
</html>
